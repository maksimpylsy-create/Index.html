<script>
const firebaseConfig = {
    apiKey: "AIzaSyAyX_ZtqQI1779hgjDrQYwgpusGBGuSkNA",
    authDomain: "poiskeloy.firebaseapp.com",
    databaseURL: "https://poiskeloy-default-rtdb.firebaseio.com",
    projectId: "poiskeloy",
    storageBucket: "poiskeloy.appspot.com",
    messagingSenderId: "7232327876242",
    appId: "1:7232327876242:web:c619f1e32adf740d16f4b"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const commentsRef = db.ref("comments");
const repliesRef = db.ref("replies");

let isAdmin = false;

// ADMIN
function enableAdmin() {
    const code = document.getElementById('adminCode').value.trim();
    if (code === "Goon67") {
        isAdmin = true;
        alert("Admin enabled");
    } else {
        alert("Wrong code");
    }
}

// ADD COMMENT
function addComment() {
    const name = document.getElementById('username').value.trim();
    const text = document.getElementById('commentText').value.trim();
    if (!name || !text) return;

    commentsRef.push({
        name,
        text,
        timestamp: Date.now()
    });

    document.getElementById('username').value = "";
    document.getElementById('commentText').value = "";
}

// RENDER COMMENT
function renderComment(key, data) {
    const list = document.getElementById('commentList');

    let div = document.getElementById("c-" + key);
    if (!div) {
        div = document.createElement('div');
        div.id = "c-" + key;
        div.className = "comment";
        list.appendChild(div);
    }

    div.innerHTML = `
        <strong>${escapeHtml(data.name)}</strong>
        <div>${escapeHtml(data.text)}</div>
        <div class="comment-time">${new Date(data.timestamp).toLocaleString()}</div>

        <div style="font-size:12px;color:#007bff;cursor:pointer" onclick="showReply('${key}')">Reply</div>

        <div id="replyBox-${key}" style="display:none"></div>
        <div id="replies-${key}" style="margin-left:10px;border-left:2px solid #ddd;padding-left:6px"></div>

        <div id="toggle-${key}" style="font-size:12px;cursor:pointer;color:#555;display:none" onclick="toggleReplies('${key}')">
            Show replies
        </div>

        <button class="delete-btn" onclick="deleteComment('${key}')">Delete</button>
    `;

    loadReplies(key);
}

// SHOW REPLY INPUT
function showReply(id) {
    const box = document.getElementById("replyBox-" + id);
    box.style.display = "block";
    box.innerHTML = `
        <input placeholder="Name" id="rname-${id}">
        <input placeholder="Reply" id="rtext-${id}">
        <button onclick="addReply('${id}')">Reply</button>
    `;
}

// ADD REPLY
function addReply(id) {
    const name = document.getElementById(`rname-${id}`).value.trim();
    const text = document.getElementById(`rtext-${id}`).value.trim();
    if (!name || !text) return;

    repliesRef.child(id).push({
        name,
        text,
        timestamp: Date.now()
    });

    document.getElementById("replyBox-" + id).innerHTML = "";
}

// LOAD REPLIES
function loadReplies(id) {
    const container = document.getElementById("replies-" + id);
    const toggle = document.getElementById("toggle-" + id);

    repliesRef.child(id).on("value", snap => {
        container.innerHTML = "";

        const replies = [];
        snap.forEach(s => replies.push({key:s.key,...s.val()}));

        replies.forEach((r,i) => {
            const el = document.createElement("div");
            el.style.background="#eee";
            el.style.marginTop="5px";
            el.style.padding="5px";
            el.style.borderRadius="5px";

            el.innerHTML = `
                <strong>${escapeHtml(r.name)}</strong>
                <div>${escapeHtml(r.text)}</div>
                <div style="font-size:11px">${new Date(r.timestamp).toLocaleString()}</div>
                <button class="delete-btn" onclick="deleteReply('${id}','${r.key}')">Delete</button>
            `;

            if (replies.length > 2 && i >= 2) {
                el.style.display = "none";
            }

            container.appendChild(el);
        });

        toggle.style.display = replies.length > 2 ? "block" : "none";
    });
}

// TOGGLE
function toggleReplies(id) {
    const items = document.querySelectorAll(`#replies-${id} div`);
    const hidden = items[2]?.style.display === "none";

    items.forEach((el,i)=>{
        if (i>=2) el.style.display = hidden ? "block" : "none";
    });

    document.getElementById(`toggle-${id}`).innerText =
        hidden ? "Hide replies" : "Show replies";
}

// DELETE COMMENT
function deleteComment(key) {
    if (!isAdmin) return alert("Admin only");
    if (confirm("Delete comment?")) {
        commentsRef.child(key).remove();
    }
}

// DELETE REPLY
function deleteReply(cid, rid) {
    if (!isAdmin) return alert("Admin only");
    if (confirm("Delete reply?")) {
        repliesRef.child(cid).child(rid).remove();
    }
}

// FIREBASE LISTENERS
commentsRef.on("child_added", s => renderComment(s.key, s.val()));
commentsRef.on("child_changed", s => renderComment(s.key, s.val()));
commentsRef.on("child_removed", s => {
    const el = document.getElementById("c-" + s.key);
    if (el) el.remove();
});

// SAFE HTML
function escapeHtml(str) {
    return String(str)
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
}
</script>
